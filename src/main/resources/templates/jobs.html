<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs | JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-body">
<div class="container py-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="fw-bold mb-1">Open Positions</h1>
            <p class="text-muted mb-0">Browse live vacancies posted by recruiters.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-dark" th:href="@{/}">Home</a>
            <a class="btn btn-dark" th:href="@{/recruiter/jobs/new}" sec:authorize="hasAuthority('ROLE_RECRUITER')">Post Job</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6" th:each="job : ${jobs}">
            <div class="job-card h-100">
                <div class="d-flex justify-content-between mb-3">
                    <span class="job-chip" th:text="${job.type}">Full Time</span>
                    <span class="text-muted small" th:text="${#temporals.format(job.postedAt, 'dd MMM yyyy')}">Date</span>
                </div>
                <h4 class="fw-bold" th:text="${job.title}">Title</h4>
                <p class="mb-1" th:text="${job.company}">Company</p>
                <p class="text-muted small" th:text="${job.location}">Location</p>
                <p class="small mb-2"><strong>Skills:</strong> <span th:text="${job.skills}">Skills</span></p>
                <p class="small mb-4"><strong>Salary:</strong> <span th:text="${job.salary}">Salary</span></p>
                <a class="btn btn-outline-dark" th:href="@{'/jobs/' + ${job.id}}">See Details</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
