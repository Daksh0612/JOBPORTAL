<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="auth-card">
                <h2 class="fw-bold mb-2">Create your portal account</h2>
                <p class="text-muted mb-4">Choose candidate or recruiter and start using the platform.</p>

                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <form th:action="@{/register}" th:object="${registrationRequest}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select th:field="*{role}" class="form-select role-select" required>
                            <option value="">Select role</option>
                            <option th:each="role : ${roles}" th:value="${role}" th:text="${role == T(com.jobportal.model.Role).ROLE_CANDIDATE ? 'Candidate' : 'Recruiter'}"></option>
                        </select>
                    </div>
                    <div class="col-12 recruiter-only d-none">
                        <label class="form-label">Company Name</label>
                        <input type="text" th:field="*{companyName}" class="form-control" placeholder="Only for recruiters">
                    </div>
                    <div class="col-12">
                        <button class="btn btn-warning w-100">Register</button>
                    </div>
                </form>

                <p class="mt-4 mb-0">Already have an account? <a th:href="@{/login}">Login</a></p>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
