<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Job | JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-body">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="dashboard-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="fw-bold mb-1">Post a New Job</h1>
                        <p class="text-muted mb-0">Create an opening for candidates to apply.</p>
                    </div>
                    <a class="btn btn-outline-dark" th:href="@{/recruiter/dashboard}">Back</a>
                </div>

                <form th:action="@{/recruiter/jobs}" th:object="${jobRequest}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-6">
                        <label class="form-label">Job Title</label>
                        <input type="text" th:field="*{title}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Company</label>
                        <input type="text" th:field="*{company}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Location</label>
                        <input type="text" th:field="*{location}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Job Type</label>
                        <input type="text" th:field="*{type}" class="form-control" placeholder="Full Time / Internship" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Salary</label>
                        <input type="text" th:field="*{salary}" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Skills</label>
                        <input type="text" th:field="*{skills}" class="form-control" placeholder="Java, Spring Boot, SQL">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" rows="7" class="form-control" required></textarea>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-warning">Publish Job</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
