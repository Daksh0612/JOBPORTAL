<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Dashboard | JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-body">
<div class="container py-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="fw-bold mb-1" th:text="${currentUser.companyName}">Company</h1>
            <p class="text-muted mb-0">Manage posted jobs and review incoming applications.</p>
        </div>
        <a class="btn btn-warning" th:href="@{/recruiter/jobs/new}">Post New Job</a>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-lg-5">
            <div class="dashboard-card h-100">
                <h3 class="fw-bold mb-3">Your Jobs</h3>
                <div th:if="${#lists.isEmpty(jobs)}" class="text-muted">No jobs posted yet.</div>
                <div th:each="job : ${jobs}" class="border rounded-3 p-3 mb-3">
                    <h5 class="fw-bold mb-1" th:text="${job.title}">Title</h5>
                    <p class="small text-muted mb-1" th:text="${job.location}">Location</p>
                    <p class="small mb-0" th:text="${job.type}">Type</p>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="dashboard-card h-100">
                <h3 class="fw-bold mb-3">Latest Applications</h3>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Candidate</th>
                            <th>Job</th>
                            <th>Resume</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(applications)}">
                            <td colspan="4" class="text-center py-4">No applications received yet.</td>
                        </tr>
                        <tr th:each="application : ${applications}">
                            <td th:text="${application.candidate.fullName}">Candidate</td>
                            <td th:text="${application.job.title}">Job</td>
                            <td><a th:href="${application.resumeLink}" target="_blank">Open</a></td>
                            <td><span class="badge text-bg-dark" th:text="${application.status}">Status</span></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
