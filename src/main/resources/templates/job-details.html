<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details | JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-body">
<div class="container py-5">
    <a class="btn btn-outline-dark mb-4" th:href="@{/jobs}">Back to Jobs</a>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="detail-card">
                <span class="job-chip mb-3 d-inline-flex" th:text="${job.type}">Type</span>
                <h1 class="fw-bold" th:text="${job.title}">Job title</h1>
                <p class="lead mb-1" th:text="${job.company}">Company</p>
                <p class="text-muted" th:text="${job.location}">Location</p>
                <hr>
                <p><strong>Salary:</strong> <span th:text="${job.salary}">Salary</span></p>
                <p><strong>Skills Required:</strong> <span th:text="${job.skills}">Skills</span></p>
                <p class="mb-0"><strong>Description:</strong></p>
                <p class="mt-2" th:text="${job.description}">Description</p>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="detail-card">
                <h3 class="fw-bold mb-3">Apply Now</h3>
                <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <div sec:authorize="isAnonymous()">
                    <p class="text-muted">Login as a candidate to apply for this job.</p>
                    <a class="btn btn-dark" th:href="@{/login}">Login</a>
                </div>

                <div sec:authorize="hasAuthority('ROLE_CANDIDATE')">
                    <form th:action="@{'/jobs/' + ${job.id} + '/apply'}" th:object="${applicationRequest}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="col-12">
                            <label class="form-label">Resume Link</label>
                            <input type="url" th:field="*{resumeLink}" class="form-control" placeholder="Drive or portfolio URL" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Cover Letter</label>
                            <textarea th:field="*{coverLetter}" class="form-control" rows="6" required></textarea>
                        </div>
                        <div class="col-12">
                            <button class="btn btn-warning w-100">Submit Application</button>
                        </div>
                    </form>
                </div>

                <div sec:authorize="hasAuthority('ROLE_RECRUITER')">
                    <p class="text-muted mb-0">Recruiters can view received applications from the dashboard.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
