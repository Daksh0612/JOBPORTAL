<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Dashboard | JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-body">
<div class="container py-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="fw-bold mb-1" th:text="'Hello, ' + ${currentUser.fullName}">Hello</h1>
            <p class="text-muted mb-0">Track the jobs you have applied for.</p>
        </div>
        <a class="btn btn-dark" th:href="@{/jobs}">Apply for More Jobs</a>
    </div>

    <div class="table-responsive dashboard-card">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>Job</th>
                <th>Company</th>
                <th>Status</th>
                <th>Applied On</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(applications)}">
                <td colspan="4" class="text-center py-4">No applications yet.</td>
            </tr>
            <tr th:each="application : ${applications}">
                <td th:text="${application.job.title}">Title</td>
                <td th:text="${application.job.company}">Company</td>
                <td><span class="badge text-bg-dark" th:text="${application.status}">Status</span></td>
                <td th:text="${#temporals.format(application.appliedAt, 'dd MMM yyyy')}">Date</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
